<div class="upload-container">

    <h1>📄 Upload Document</h1>

    <p class="subtitle">
        Upload your documents to start chatting with AI.
    </p>

    <div class="upload-box" (click)="fileInput.click()">

        <input
            #fileInput
            type="file"
            hidden
            (change)="onFileSelected($event)">

        <div class="upload-icon">
            ☁️
        </div>

        <h2>Drag & Drop your files here</h2>

        <p class="supported-files">
            PDF • DOCX • TXT • Max 10 MB
        </p>

        <div class="divider">
            <span></span>
            <p>OR</p>
            <span></span>
        </div>

        <button
            type="button"
            class="browse-btn"
            (click)="$event.stopPropagation(); fileInput.click()">

            📂 Browse Files

        </button>

        @if(selectedFile){

            <p class="selected-file">
                📄 {{ selectedFile.name }}
            </p>

        }

        @else {

            <p class="selected-file">
                No file selected
            </p>

        }

    </div>

    <button
        class="upload-btn"
        [disabled]="!selectedFile"
        (click)="upload()">

        ⬆ Upload

    </button>

</div>
