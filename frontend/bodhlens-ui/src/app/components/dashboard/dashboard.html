<div class="dashboard-container">

    <h1 class="title">BodhLens AI</h1>

    <p class="subtitle">AI-powered Document Intelligence</p>

    <h2 class="welcome">Welcome, {{ firstName }}</h2>

    <div class="card-container">
        
        <div class="dashboard-card" (click)="goToUpload()">
            <h3>📄 Upload Document</h3>
            <p>Upload PDFs and other supported files.</p>
        </div>

        <div class="dashboard-card" (click)="goToChat()">
            <h3>🤖 Ask AI</h3>
            <p>Chat with your uploaded documents.</p>
        </div>

        <div class="dashboard-card" (click)="goToDocuments()">
            <h3>📚 My Documents</h3>
            <p>View and manage your uploaded files.</p>
        </div>

        <div class="dashboard-card" (click)="comingSoon()">
            <h3>📊 Analytics</h3>
            <p>Coming Soon</p>
        </div>

    </div>

    <button class="logout-btn" (click)="logout()">
        Logout
    </button>

</div>
